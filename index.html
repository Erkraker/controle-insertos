<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Insertos V3 Protótipo</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.tabs button{padding:10px 16px;margin-right:8px;border:none;border-radius:8px;background:#ddd;cursor:pointer}
.tabs button.active{background:#2563eb;color:#fff}
.tab{display:none;margin-top:20px}
.tab.active{display:block}
input{display:block;width:100%;padding:10px;margin:8px 0 16px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
.action{background:#16a34a;color:#fff;padding:12px;border:none;border-radius:8px;cursor:pointer}
.result{margin-top:16px;padding:16px;background:#eef6ff;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<h1>Controle de Insertos - Protótipo V3</h1>
<div class="tabs">
<button class="active" onclick="openTab('calcular', this)">Calcular</button>
<button onclick="openTab('historico', this)">Histórico</button>
<button onclick="openTab('broca', this)">Definir Broca</button>
</div>
<div id="calcular" class="tab active"><h2>Calcular</h2><p>Área existente do protótipo (placeholder).</p></div>
<div id="historico" class="tab"><h2>Histórico</h2><p>Área existente do protótipo (placeholder).</p></div>
<div id="broca" class="tab">
<h2>Definir Broca</h2>
<label>Diâmetro do furo (mm)</label><input id="diametroFuro" type="number" step="0.01">
<label>Profundidade do furo (mm)</label><input id="profundidadeFuro" type="number" step="0.01">
<label>Altura do friso (mm)</label><input id="alturaFriso" type="number" step="0.01">
<label>Deslocamento maior em X (mm)</label><input id="deslocamentoX" type="number" step="0.01">
<label>Diâmetro da camisa (mm)</label><input id="diametroCamisa" type="number" step="0.01">
<button class="action" onclick="definirBroca()">Definir Broca</button>
<div id="resultadoBroca" class="result"></div>
</div>
</div>
<script>
function openTab(id, btn){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 btn.classList.add('active');
}
const brocas = {16:{curta:153,longa:217},18:{curta:172.5,longa:244.5}};
function definirBroca(){
 const diametroFuro=Number(document.getElementById('diametroFuro').value);
 const profundidade=Number(document.getElementById('profundidadeFuro').value);
 const alturaFriso=Number(document.getElementById('alturaFriso').value);
 const deslocamentoX=Number(document.getElementById('deslocamentoX').value);
 if(!diametroFuro||!profundidade){document.getElementById('resultadoBroca').innerHTML='Preencha ao menos diâmetro e profundidade.';return;}
 const brocaDiametro=diametroFuro<=16?16:18;
 const necessario=profundidade+alturaFriso+deslocamentoX;
 const dados=brocas[brocaDiametro];
 let tipo='',limite=0,status='';
 if(necessario<=dados.curta){tipo='Curta';limite=dados.curta;status='OK para operação';}
 else if(necessario<=dados.longa){tipo='Longa';limite=dados.longa;status='OK para operação';}
 else {tipo='Não atende';limite=dados.longa;status='Necessário buscar outra solução';}
 document.getElementById('resultadoBroca').innerHTML=`<h3>Resultado</h3><p><strong>Broca recomendada:</strong> Ø${brocaDiametro} ${tipo}</p><p><strong>Comprimento necessário:</strong> ${necessario.toFixed(2)} mm</p><p><strong>Limite da broca:</strong> ${limite} mm</p><p><strong>Status:</strong> ${status}</p>`;
}
</script>
</body>
</html>
